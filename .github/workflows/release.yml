name: Release

# Publish Grok Build Community to:
#   - GitHub Releases (VSIX asset)
#   - VS Code Marketplace (vsce)
#   - Open VSX Registry (ovsx)
#
# Triggers:
#   - Push tag: v0.3.1 (must match package.json version)
#   - Actions → Release → Run workflow
#
# Required secrets (repo Settings → Secrets and variables → Actions):
#   VSCE_PAT  — Azure DevOps PAT with Marketplace (Acquire + Publish) for publisher `tienpham`
#   OVSX_PAT  — https://open-vsx.org/user-settings/tokens

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: Publish to VS Code Marketplace
        type: boolean
        default: true
      publish_openvsx:
        description: Publish to Open VSX
        type: boolean
        default: true
      create_github_release:
        description: Create GitHub Release and attach VSIX
        type: boolean
        default: true
      dry_run:
        description: Build + package only (skip all publishes)
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Package & publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: pkg
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          PUBLISHER="$(node -p "require('./package.json').publisher")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "publisher=${PUBLISHER}" >> "$GITHUB_OUTPUT"
          echo "vsix=${NAME}-${VERSION}.vsix" >> "$GITHUB_OUTPUT"
          echo "Package ${PUBLISHER}.${NAME}@${VERSION}"

      - name: Validate tag matches package.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="${{ steps.pkg.outputs.version }}"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${PKG}"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npm run package

      - name: Verify VSIX exists
        run: |
          test -f "${{ steps.pkg.outputs.vsix }}"
          ls -lh "${{ steps.pkg.outputs.vsix }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.vsix }}
          path: ${{ steps.pkg.outputs.vsix }}
          if-no-files-found: error
          retention-days: 90

      - name: Resolve publish flags
        id: flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          # Only meaningful on workflow_dispatch; empty on tag push
          IN_DRY_RUN: ${{ inputs.dry_run }}
          IN_MARKETPLACE: ${{ inputs.publish_marketplace }}
          IN_OPENVSX: ${{ inputs.publish_openvsx }}
          IN_GH_RELEASE: ${{ inputs.create_github_release }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "${IN_DRY_RUN:-false}" = "true" ]; then
            echo "marketplace=false" >> "$GITHUB_OUTPUT"
            echo "openvsx=false" >> "$GITHUB_OUTPUT"
            echo "gh_release=false" >> "$GITHUB_OUTPUT"
            echo "Dry run — skip all publishes"
            exit 0
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # defaults are true in workflow_dispatch inputs
            echo "marketplace=${IN_MARKETPLACE:-true}" >> "$GITHUB_OUTPUT"
            echo "openvsx=${IN_OPENVSX:-true}" >> "$GITHUB_OUTPUT"
            echo "gh_release=${IN_GH_RELEASE:-true}" >> "$GITHUB_OUTPUT"
          else
            # Tag push: publish everywhere
            echo "marketplace=true" >> "$GITHUB_OUTPUT"
            echo "openvsx=true" >> "$GITHUB_OUTPUT"
            echo "gh_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.flags.outputs.gh_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.pkg.outputs.version }}"
          VSIX="${{ steps.pkg.outputs.vsix }}"
          TAG="v${VERSION}"
          TITLE="Grok Build - Community ${VERSION}"
          PUBLISHER="${{ steps.pkg.outputs.publisher }}"
          NAME="${{ steps.pkg.outputs.name }}"

          NOTES_FILE="$(mktemp)"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              BEGIN { p=0 }
              $0 ~ "^## \\[" ver "\\]" { p=1; print; next }
              p && $0 ~ /^## \[/ { exit }
              p { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            cat > "$NOTES_FILE" <<EOF
          ## ${TITLE}

          Community VS Code host for Grok Build (\`${PUBLISHER}.${NAME}\`).

          ### Install from VSIX
          1. Download \`${VSIX}\` from this release
          2. VS Code → Extensions → ⋯ → **Install from VSIX…**

          Requires the **Grok Build CLI** (\`grok\`) on PATH (or \`grok.binaryPath\`).
          EOF
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading/updating asset"
            gh release upload "$TAG" "$VSIX" --clobber
          elif git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            gh release create "$TAG" "$VSIX" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --verify-tag
          else
            # workflow_dispatch without a pre-existing tag
            gh release create "$TAG" "$VSIX" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --target "${{ github.sha }}"
          fi

      - name: Publish to VS Code Marketplace
        if: steps.flags.outputs.marketplace == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "::warning::VSCE_PAT secret is not set — skip VS Code Marketplace. Add Azure DevOps PAT (Marketplace Publish) as secret VSCE_PAT."
            echo "marketplace_skipped=true" >> "$GITHUB_ENV"
            exit 0
          fi
          npx vsce publish \
            --packagePath "${{ steps.pkg.outputs.vsix }}" \
            --no-dependencies \
            --allow-missing-repository \
            --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: steps.flags.outputs.openvsx == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "::warning::OVSX_PAT secret is not set — skip Open VSX. Create a token at https://open-vsx.org/user-settings/tokens as secret OVSX_PAT."
            echo "openvsx_skipped=true" >> "$GITHUB_ENV"
            exit 0
          fi
          npx --yes ovsx publish \
            "${{ steps.pkg.outputs.vsix }}" \
            --pat "$OVSX_PAT"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Release ${{ steps.pkg.outputs.version }}"
            echo ""
            echo "| Target | Status |"
            echo "|--------|--------|"
            echo "| VSIX | \`${{ steps.pkg.outputs.vsix }}\` |"
            echo "| GitHub Release | ${{ steps.flags.outputs.gh_release }} |"
            echo "| VS Code Marketplace | ${{ steps.flags.outputs.marketplace }} |"
            echo "| Open VSX | ${{ steps.flags.outputs.openvsx }} |"
            echo ""
            echo "**Extension id:** \`${{ steps.pkg.outputs.publisher }}.${{ steps.pkg.outputs.name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
