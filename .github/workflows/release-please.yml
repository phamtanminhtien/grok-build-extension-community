name: Release Please

# Google release-please: on every push to main, open/update a Release PR
# from conventional commits. When that PR is merged, release-please tags +
# creates a GitHub Release, then this workflow packages the VSIX and
# publishes to Marketplace / Open VSX (publish job runs only when
# release_created is true — avoids the GITHUB_TOKEN tag-push pitfall of a
# separate Release workflow).
#
# Commit style (https://www.conventionalcommits.org/):
#   feat: ...     → minor (or patch if pre-1.0 with bump-patch-for-minor-pre-major)
#   fix: ...      → patch
#   feat!: ...    → major
#   chore: ...    → no version bump (hidden in changelog)
#
# Required secrets (repo Settings → Secrets and variables → Actions):
#   VSCE_PAT  — Azure DevOps PAT with Marketplace (Acquire + Publish) for publisher `tienpham`
#   OVSX_PAT  — https://open-vsx.org/user-settings/tokens

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summary
        if: always()
        env:
          RP_RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          RP_TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RP_PRS: ${{ steps.release.outputs.prs_created }}
        run: |
          {
            echo "## Release Please"
            echo ""
            echo "- **release_created:** ${RP_RELEASE_CREATED:-false}"
            echo "- **tag_name:** ${RP_TAG_NAME:-none}"
            echo "- **prs_created:** ${RP_PRS:-false}"
            echo ""
            echo "If no release was created, release-please opened/updated a Release PR (or there are no releasable commits)."
            echo "After you **merge** the Release PR, this workflow tags + creates the GitHub Release, then the **Publish** job packages the VSIX and publishes to Marketplace / Open VSX."
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Package & publish
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Read package version
        id: pkg
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          PUBLISHER="$(node -p "require('./package.json').publisher")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "publisher=${PUBLISHER}" >> "$GITHUB_OUTPUT"
          echo "vsix=${NAME}-${VERSION}.vsix" >> "$GITHUB_OUTPUT"
          echo "Package ${PUBLISHER}.${NAME}@${VERSION}"

      - name: Validate tag matches package.json
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          TAG="${TAG_NAME#v}"
          PKG="${{ steps.pkg.outputs.version }}"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${PKG}"
            exit 1
          fi

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test

      - name: Build
        run: yarn build

      - name: Package VSIX
        run: yarn package

      - name: Verify VSIX exists
        run: |
          test -f "${{ steps.pkg.outputs.vsix }}"
          ls -lh "${{ steps.pkg.outputs.vsix }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.vsix }}
          path: ${{ steps.pkg.outputs.vsix }}
          if-no-files-found: error
          retention-days: 90

      - name: Attach VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          VSIX="${{ steps.pkg.outputs.vsix }}"
          # release-please already created the GitHub Release for this tag
          gh release upload "$TAG_NAME" "$VSIX" --clobber

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "::warning::VSCE_PAT secret is not set — skip VS Code Marketplace. Add Azure DevOps PAT (Marketplace Publish) as secret VSCE_PAT."
            exit 0
          fi
          npx vsce publish \
            --packagePath "${{ steps.pkg.outputs.vsix }}" \
            --no-dependencies \
            --allow-missing-repository \
            --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "::warning::OVSX_PAT secret is not set — skip Open VSX. Create a token at https://open-vsx.org/user-settings/tokens as secret OVSX_PAT."
            exit 0
          fi
          npx --yes ovsx publish \
            "${{ steps.pkg.outputs.vsix }}" \
            --pat "$OVSX_PAT"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Publish ${{ steps.pkg.outputs.version }}"
            echo ""
            echo "| Target | Status |"
            echo "|--------|--------|"
            echo "| VSIX | \`${{ steps.pkg.outputs.vsix }}\` |"
            echo "| GitHub Release | attach to \`${{ needs.release-please.outputs.tag_name }}\` |"
            echo "| VS Code Marketplace | via VSCE_PAT |"
            echo "| Open VSX | via OVSX_PAT |"
            echo ""
            echo "**Extension id:** \`${{ steps.pkg.outputs.publisher }}.${{ steps.pkg.outputs.name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
